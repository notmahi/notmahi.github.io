<div class="card">
  <h3 style="font-size: 1rem; margin: 0 0 0.35rem 0; line-height: 1.3;">
    <a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration: none;">
      {{ post.title }}
    </a>
  </h3>
  <div style="font-size: 0.8rem; opacity: 0.5;">{{ post.date | date: "%b %d, %Y"}}</div>
</div>
