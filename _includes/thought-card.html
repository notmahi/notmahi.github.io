<div class="card">
  {% if post.header_image %}
  <div style="float: right; max-width: 30%; margin-left: 1rem; margin-bottom: 0.5rem;">
    <img src="{{ post.header_image }}" style="width: 100%; border-radius: 8px;" />
  </div>
  {% endif %}
  <h3 class="thought-card-title" style="font-size: 1.1rem; margin: 0 0 0.35rem 0;">
    <a href="{{ site.baseurl }}{{ post.url }}" style="text-decoration: none;">
      {{ post.title }}
    </a>
  </h3>
  <div style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 0.5rem;">{{ post.date | date: "%b %d, %Y"}}</div>
  <div style="font-size: 0.9rem; line-height: 1.6; opacity: 0.75;">
    {{ post.content | split: '<!--break-->' | first | strip_html | truncate: 300 }}
    {% if post.content contains '<!--break-->' %}
    <a href="{{ post.url }}" style="font-size: 0.85rem;">read more</a>
    {% endif %}
  </div>
</div>
