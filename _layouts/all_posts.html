{% include header.html %}

{% include nav.html %}

<div class="full-width-layout">
  <a href="{{ site.url }}{{ site.baseurl | append:'/' }}" class="back-link">&larr; Home</a>

  <h2 class="section-heading" style="font-size: 2rem; margin-bottom: 1rem;">Writings</h2>

  {% unless content == "" %}
  <p style="opacity: 0.75; margin-bottom: 1.5rem;">
    {{ content }}
  </p>
  {% endunless %}

  {% unless posts_total == 0 %}
  <div style="display: flex; flex-direction: column; gap: 0.75rem;">
    {% for post in site.categories.writings %}
    {% include thought-card.html %}
    {% endfor %}
  </div>
  {% endunless %}
</div>

{% include footer.html %}
